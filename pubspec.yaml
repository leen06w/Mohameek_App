name: mahamik_flutter_source
description: Flutter source port for the Mahamik legal platform UI.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 🔥 Firebase
  firebase_core: ^3.15.2
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1

  # UI & Utilities
  file_picker: ^8.1.2
  flutter_dotenv: ^6.0.0
  flutter_map: ^8.3.0
  geolocator: ^13.0.2
  google_fonts: ^6.3.0
  google_maps_flutter: ^2.17.0
  http: ^1.6.0
  latlong2: ^0.9.1
  pdfrx: ^1.1.19
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - .env.example
    - assets/images/
    - assets/legal_docs/